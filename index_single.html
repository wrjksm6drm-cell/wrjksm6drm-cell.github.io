/* 背景遮罩，增加科技感 */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 15, 20, 0.85);
    z-index: -1;
}

.header {
    text-align: center;
    margin-bottom: 40px;
    border-bottom: 2px solid #ff9d00;
    padding-bottom: 20px;
}

.header h1 {
    font-size: 2.2em;
    color: #ff9d00;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(255, 157, 0, 0.5);
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

section {
    background: rgba(20, 25, 30, 0.9);
    border: 1px solid #3a4a5a;
    margin-bottom: 25px;
    padding: 25px;
    position: relative;
    /* 战术风格切角 */
    clip-path: polygon(
        0 0, 
        100% 0, 
        100% calc(100% - 15px), 
        calc(100% - 15px) 100%, 
        0 100%
    );
}

h2 {
    color: #ff9d00;
    margin-bottom: 20px;
    font-size: 1.3em;
    border-left: 4px solid #ff9d00;
    padding-left: 10px;
    display: flex;
    align-items: center;
}

/* 商品网格 */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.product-card {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid #4a5a6a;
    padding: 20px;
    transition: all 0.3s;
}

.product-card:hover {
    border-color: #ff9d00;
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
}

.product-name {
    font-size: 1.2em;
    font-weight: bold;
    color: #fff;
    margin-bottom: 8px;
}

.product-desc {
    color: #8a9aaa;
    font-size: 0.9em;
    margin-bottom: 15px;
}

.product-price {
    color: #ff9d00;
    font-size: 1.4em;
    font-weight: bold;
    margin-bottom: 15px;
}

.add-to-cart-btn {
    width: 100%;
    padding: 10px;
    background: #ff9d00;
    color: #000;
    border: none;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s;
}

.add-to-cart-btn:hover {
    background: #ffb700;
}

/* 购物车 */
.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    border-bottom: 1px solid #3a4a5a;
}

.cart-item-name {
    font-weight: bold;
}

.cart-item-price {
    color: #ff9d00;
}

.quantity-controls {
    display: flex;
    align-items: center;
    gap: 8px;
}

.qty-btn {
    width: 28px;
    height: 28px;
    background: #2a3a4a;
    color: #fff;
    border: 1px solid #4a5a6a;
    cursor: pointer;
}

.remove-btn {
    color: #ff4444;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.2em;
    margin-left: 10px;
}

.cart-summary {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid #ff9d00;
    text-align: right;
}

.total {
    font-size: 1.3em;
    color: #ff9d00;
    font-weight: bold;
}

/* 表单与支付 */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #8a9aaa;
    font-size: 0.9em;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 12px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid #3a4a5a;
    color: #fff;
    font-family: inherit;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #ff9d00;
}

.payment-methods {
    display: flex;
    gap: 15px;
}

.payment-option {
    flex: 1;
    padding: 15px;
    border: 1px solid #3a4a5a;
    background: rgba(0, 0, 0, 0.3);
    cursor: pointer;
    text-align: center;
    transition: all 0.3s;
}

.payment-option.selected {
    border-color: #ff9d00;
    background: rgba(255, 157, 0, 0.1);
}

.qr-container {
    text-align: center;
    margin-top: 15px;
    padding: 15px;
    background: #fff;
    display: none;
}

.qr-container.active {
    display: block;
}

.qr-container img {
    max-width: 200px;
}

.submit-btn {
    width: 100%;
    padding: 15px;
    background: #ff9d00;
    color: #000;
    border: none;
    font-size: 1.1em;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 10px;
}

/* 联系方式 */
.contact-info {
    text-align: center;
    margin-top: 15px;
    padding: 10px;
    background: rgba(255, 157, 0, 0.1);
    border: 1px dashed #ff9d00;
    color: #ff9d00;
    font-weight: bold;
    letter-spacing: 1px;
}

/* 弹窗 */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal.hidden {
    display: none;
}

.modal-content {
    background: #14191e;
    border: 2px solid #ff9d00;
    padding: 30px;
    max-width: 450px;
    width: 90%;
    text-align: center;
}

.modal-content h2 {
    border: none;
    justify-content: center;
    color: #ff9d00;
}

.order-detail-row {
    padding: 8px 0;
    border-bottom: 1px solid #3a4a5a;
    text-align: left;
    font-size: 0.95em;
}

.modal-btn {
    margin-top: 20px;
    padding: 10px 30px;
    background: transparent;
    border: 1px solid #ff9d00;
    color: #ff9d00;
    cursor: pointer;
}

/* 彩蛋样式 */
.easter-egg-container {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    padding: 10px;
    background: rgba(0, 0, 0, 0.9);
    border: 1px solid #ff9d00;
    z-index: 100;
    animation: fadeIn 0.5s;
}

.easter-egg-container.hidden {
    display: none;
}

.easter-egg-img {
    max-width: 45%;
    max-height: 80vh;
    object-fit: contain;
    border: 2px solid #ff9d00;
    box-shadow: 0 0 20px rgba(255, 157, 0, 0.5);
    transition: transform 0.3s;
}

.easter-egg-img:hover {
    transform: scale(1.05) rotate(2deg);
}

/* 标题故障特效 */
.glitch-active {
    animation: glitch 0.2s infinite;
    color: #f00 !important;
    text-shadow: 2px 0 #0ff, -2px 0 #f0f;
}

@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
}

@keyframes glitchIn {
    from { opacity: 0; clip-path: inset(50% 0 50% 0); }
    to { opacity: 1; clip-path: inset(0 0 0 0); }
}

@media (max-width: 768px) {
    .payment-methods {
        flex-direction: column;
    }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
}

</style>
</head>

            <button class="add-to-cart-btn" onclick="addToCart(${product.id})">
                加入清单
            </button>
        </div>
    `).join('');
}

// 添加到购物车
function addToCart(productId) {
    const product = products.find(p => p.id === productId);
    const existingItem = cart.find(item => item.id === productId);
    
    if (existingItem) {
        existingItem.quantity++;
    } else {
        cart.push({ ...product, quantity: 1 });
    }
    
    renderCart();
    showNotification(`[系统] ${product.name} 已添加`);
}

// 渲染购物车
function renderCart() {
    const cartItems = document.getElementById('cartItems');
    
    if (cart.length === 0) {
        cartItems.innerHTML = '<p class="empty-cart">[ 清单为空 ]</p>';
    } else {
        cartItems.innerHTML = cart.map(item => `
            <div class="cart-item">
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">¥${item.price.toFixed(2)}</div>
                </div>
                <div class="quantity-controls">
                    <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                    <span class="quantity">${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                    <button class="remove-btn" onclick="removeFromCart(${item.id})">×</button>
                </div>
            </div>
        `).join('');
    }
    
    updateSummary();
}

// 更新数量
function updateQuantity(productId, change) {
    const item = cart.find(item => item.id === productId);
    if (item) {
        item.quantity += change;
        if (item.quantity <= 0) {
            removeFromCart(productId);
        } else {
            renderCart();
        }
    }
}

// 从购物车移除
function removeFromCart(productId) {
    cart = cart.filter(item => item.id !== productId);
    renderCart();
}

// 更新汇总信息
function updateSummary() {
    const totalQuantity = cart.reduce((sum, item) => sum + item.quantity, 0);
    const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    
    document.getElementById('totalQuantity').textContent = totalQuantity;
    document.getElementById('totalAmount').textContent = `¥${totalAmount.toFixed(2)}`;
}

// 选择支付方式
function selectPayment(method) {
    selectedPayment = method;
    document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    
    document.getElementById('qrWechat').classList.toggle('active', method === 'wechat');
    document.getElementById('qrAlipay').classList.toggle('active', method === 'alipay');
}

// 设置表单提交处理
function setupFormHandler() {
    const form = document.getElementById('orderForm');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        if (cart.length === 0) {
            alert('[错误] 请先选择物资');
            return;
        }
        
        submitOrder();
    });
}

// 提交订单
function submitOrder() {
    const orderData = {
        customerName: document.getElementById('customerName').value,
        customerPhone: document.getElementById('customerPhone').value,
        paymentMethod: selectedPayment === 'wechat' ? '微信支付' : '支付宝',
        remark: document.getElementById('remark').value,
        items: cart,
        totalQuantity: cart.reduce((sum, item) => sum + item.quantity, 0),
        totalAmount: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
        orderTime: new Date().toLocaleString('zh-CN')
    };
    
    // 发送到 Bark
    sendToBark(orderData);
    
    // 显示订单详情
    showOrderDetails(orderData);
    
    // 清空购物车和表单
    cart = [];
    renderCart();
    document.getElementById('orderForm').reset();
    selectPayment('wechat');
}

// 发送到 Bark 推送
async function sendToBark(orderData) {
    const barkKey = '9BQZpzNufz88CPZQxVZPdi';
    
    const itemsText = orderData.items.map(item => 
        `${item.name} × ${item.quantity}`
    ).join(', ');
    
    const title = `三角洲新订单 ¥${orderData.totalAmount.toFixed(2)}`;
    const body = `干员：${orderData.customerName}\n联络：${orderData.customerPhone}\n渠道：${orderData.paymentMethod}\n物资：${itemsText}${orderData.remark ? `\n备注：${orderData.remark}` : ''}`;
    
    try {
        await fetch(`https://api.day.app/${barkKey}/${encodeURIComponent(title)}/${encodeURIComponent(body)}`);
    } catch (error) {
        console.error('Notification failed:', error);
    }
}

// 显示订单详情弹窗
function showOrderDetails(orderData) {
    const modal = document.getElementById('orderModal');
    const detailsDiv = document.getElementById('orderDetails');
    
    const itemsHtml = orderData.items.map(item => 
        `<div class="order-detail-row">${item.name} x ${item.quantity} = ¥${(item.price * item.quantity).toFixed(2)}</div>`
    ).join('');
    
    detailsDiv.innerHTML = `
        <div class="order-detail-row"><strong>时间：</strong>${orderData.orderTime}</div>
        <div class="order-detail-row"><strong>干员：</strong>${orderData.customerName}</div>
        <div class="order-detail-row"><strong>联络：</strong>${orderData.customerPhone}</div>
        <div class="order-detail-row"><strong>渠道：</strong>${orderData.paymentMethod}</div>
        <hr style="margin: 10px 0; border-color: #3a4a5a;">
        ${itemsHtml}
        <div class="order-detail-row" style="font-weight: bold; color: #ff9d00;">
            <strong>合计：</strong>¥${orderData.totalAmount.toFixed(2)}
        </div>
    `;
    
    modal.classList.remove('hidden');
}

// 关闭弹窗
function closeModal() {
    document.getElementById('orderModal').classList.add('hidden');
}

// 显示通知
function showNotification(message) {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: #ff9d00;
        color: #000;
        padding: 15px 25px;
        font-weight: bold;
        box-shadow: 0 0 15px rgba(255, 157, 0, 0.5);
        z-index: 2000;
        animation: slideIn 0.3s ease;
    `;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.remove();
    }, 2000);
}

// 彩蛋逻辑
let clickCount = 0;
let clickTimer = null;

function setupEasterEgg() {
    const header = document.getElementById('triggerHeader');
    if (header) {
        header.addEventListener('click', triggerEasterEgg);
    }
}

function triggerEasterEgg(e) {
    // 防止点击弹窗内的图片时触发计数
    if (e && e.target.closest('.easter-egg-container')) return;

    clickCount++;
    
    if (clickTimer) clearTimeout(clickTimer);
    
    // 每次点击都让标题闪烁一下
    const title = document.getElementById('mainTitle');
    if (title) {
        title.style.color = '#f00';
        setTimeout(() => title.style.color = '', 100);
    }
    
    clickTimer = setTimeout(() => {
        clickCount = 0;
    }, 2000); // 2秒内连续点击
    
    if (clickCount === 5) {
        showEasterEgg();
        clickCount = 0;
    }
}

function showEasterEgg() {
    console.log('[Debug] Easter egg triggered!');
    const container = document.getElementById('easterEggContainer');
    if (!container) {
        console.error('[Error] Container not found');
        return;
    }

    container.classList.remove('hidden');
    
    // 填充图片
    container.innerHTML = `
        <img src="easter-egg-1.jpeg" class="easter-egg-img" alt="Secret 1">
        <img src="easter-egg-2.jpeg" class="easter-egg-img" alt="Secret 2">
        <img src="easter-egg-3.jpg" class="easter-egg-img" alt="Secret 3">
    `;
    
    // 触发全屏故障特效
    document.body.classList.add('glitch-active');
    showNotification('[系统] ⚠️ 检测到非法入侵！机密档案已强制解锁');
    
    // 8秒后自动关闭
    setTimeout(() => {
        closeEasterEgg();
    }, 8000);
}

function closeEasterEgg() {
    const container = document.getElementById('easterEggContainer');
    if (container) {
        container.classList.add('hidden');
    }
    document.body.classList.remove('glitch-active');
}

// 点击背景关闭彩蛋
document.addEventListener('click', function(e) {
    const container = document.getElementById('easterEggContainer');
    if (container && !container.classList.contains('hidden') && !e.target.closest('.easter-egg-container')) {
        closeEasterEgg();
    }
});

style.textContent = `
    @keyframes slideIn {
        from { transform: translateX(400px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
`;
document.head.appendChild(style);
